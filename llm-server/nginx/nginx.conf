# ============================================================
# Nginx Reverse Proxy for LLM Server
# Bật bằng: docker compose --profile proxy up -d
# ============================================================
# Tính năng:
#   - API Key authentication (header X-API-Key)
#   - Rate limiting (10 req/min per IP)
#   - Request size limit (10MB)
#   - CORS headers
#   - Access logging
# ============================================================

events {
    worker_connections 64;
}

http {
    # Rate limiting: 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=llm_limit:10m rate=10r/m;

    # Logging format
    log_format llm '$remote_addr - [$time_local] "$request" $status '
                   '$body_bytes_sent "$http_x_api_key"';

    server {
        listen 11435;
        server_name _;

        access_log /var/log/nginx/access.log llm;

        # Request size limit (LLM prompts can be large)
        client_max_body_size 10m;

        # Timeouts for LLM inference (can be slow)
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # --- API Key Check ---
        # Set PROXY_API_KEY in .env to enable
        # Client sends: -H "X-API-Key: your-key"
        set $api_key_valid "0";

        # Skip auth for health check endpoint
        if ($request_uri = "/api/tags") {
            set $api_key_valid "1";
        }

        # Validate API key from header
        if ($http_x_api_key = "${PROXY_API_KEY}") {
            set $api_key_valid "1";
        }

        # If no PROXY_API_KEY configured, allow all
        # (empty env var means auth disabled)

        # --- Rate Limiting ---
        location /api/chat {
            limit_req zone=llm_limit burst=5 nodelay;

            # CORS headers
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key";

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://ollama:11434;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/generate {
            limit_req zone=llm_limit burst=5 nodelay;

            add_header Access-Control-Allow-Origin *;
            proxy_pass http://ollama:11434;
            proxy_set_header Host $host;
        }

        # Other endpoints (tags, show, etc.) — no rate limit
        location / {
            proxy_pass http://ollama:11434;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
